plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'ai.nexuzy.assistant'
    compileSdk 34

    defaultConfig {
        applicationId "ai.nexuzy.assistant"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // Inject API keys from local.properties
        buildConfigField "String", "NEWS_API_KEY", '"' + (project.findProperty('NEWS_API_KEY') ?: '') + '"'
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // Core
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'

    // Location
    implementation 'com.google.android.gms:play-services-location:21.2.0'

    // Networking
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.google.code.gson:gson:2.10.1'

    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'

    // RecyclerView for chat UI
    implementation 'androidx.recyclerview:recyclerview:1.3.2'

    // MLC-LLM (mlc4j AAR - place in app/libs/)
    // implementation files('libs/mlc4j-release.aar')
}