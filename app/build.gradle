plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'ai.nexuzy.assistant'
    compileSdk 34

    defaultConfig {
        applicationId "ai.nexuzy.assistant"
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName "2.0"

        // Inject API keys from local.properties
        buildConfigField "String", "NEWS_API_KEY",    '"' + (project.findProperty('NEWS_API_KEY')    ?: '') + '"'
        buildConfigField "String", "MAPS_API_KEY",    '"' + (project.findProperty('MAPS_API_KEY')    ?: '') + '"'
        buildConfigField "String", "ADMOB_APP_ID",    '"' + (project.findProperty('ADMOB_APP_ID')    ?: 'ca-app-pub-3940256099942544~3347511713') + '"'
        buildConfigField "String", "ADMOB_BANNER_ID", '"' + (project.findProperty('ADMOB_BANNER_ID') ?: 'ca-app-pub-3940256099942544/6300978111') + '"'
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
}

dependencies {
    // Core Android
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'

    // Location (Google Maps + FusedLocation)
    implementation 'com.google.android.gms:play-services-location:21.2.0'
    implementation 'com.google.android.gms:play-services-maps:18.2.0'

    // Networking
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.google.code.gson:gson:2.10.1'

    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'

    // AdMob
    implementation 'com.google.android.gms:play-services-ads:23.1.0'

    // Lottie (animations for voice orb)
    implementation 'com.airbnb.android:lottie:6.4.0'

    // Glide (avatar / weather icons)
    implementation 'com.github.bumptech.glide:glide:4.16.0'

    // MLC-LLM (mlc4j AAR — place in app/libs/)
    // implementation files('libs/mlc4j-release.aar')
    // OR use HuggingFace Qwen3B GGUF via llama.cpp android bindings
    // implementation files('libs/llama-android.aar')
}
