plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'ai.nexuzy.assistant'
    compileSdk 35

    defaultConfig {
        applicationId "ai.nexuzy.assistant"
        minSdk 26
        targetSdk 34
        versionCode 6
        versionName "6.0"

        buildConfigField "String", "NEWS_API_KEY",    '"' + (project.findProperty('NEWS_API_KEY')    ?: '') + '"'
        buildConfigField "String", "MAPS_API_KEY",    '"' + (project.findProperty('MAPS_API_KEY')    ?: '') + '"'
        buildConfigField "String", "ADMOB_APP_ID",    '"' + (project.findProperty('ADMOB_APP_ID')    ?: 'ca-app-pub-3940256099942544~3347511713') + '"'
        buildConfigField "String", "ADMOB_BANNER_ID", '"' + (project.findProperty('ADMOB_BANNER_ID') ?: 'ca-app-pub-3940256099942544/6300978111') + '"'
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }

    packagingOptions {
        jniLibs { useLegacyPackaging = true }
        resources { excludes += '/META-INF/{AL2.0,LGPL2.1}' }
    }
}

dependencies {
    // Core Android
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'

    // Location + Maps
    implementation 'com.google.android.gms:play-services-location:21.2.0'
    implementation 'com.google.android.gms:play-services-maps:18.2.0'

    // Networking
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.google.code.gson:gson:2.10.1'

    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'

    // AdMob
    implementation 'com.google.android.gms:play-services-ads:23.1.0'

    // Lottie
    implementation 'com.airbnb.android:lottie:6.4.0'

    // ============================================================
    // MLC-LLM (mlc4j)
    // ============================================================
    // mlc4j is generated by:  python3 -m mlc_llm package
    // Output goes to:          dist/lib/mlc4j
    // settings.gradle must:    project(':mlc4j').projectDir = file('dist/lib/mlc4j')
    //
    // See: https://github.com/mlc-ai/mlc-llm/blob/main/android/MLCChat/settings.gradle
    // After running `python3 -m mlc_llm package`, uncomment:
    // implementation project(':mlc4j')
    // ============================================================
}
