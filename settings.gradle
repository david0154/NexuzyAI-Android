pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "NexuzyAI"
include ':app'

// ============================================================
//  HOW MLC-LLM ACTUALLY WORKS (read mlc-ai/mlc-llm/android/MLCChat/settings.gradle)
//
//  The official MLCChat settings.gradle does:
//     include ':mlc4j'
//     project(':mlc4j').projectDir = file('dist/lib/mlc4j')
//
//  This means mlc4j lives inside dist/lib/mlc4j — which is
//  generated by running the MLC build pipeline:
//     python3 -m mlc_llm package
//  This command reads mlc-package-config.json and:
//    1. Compiles model libs (.so) for each model
//    2. Generates dist/lib/mlc4j  ← the Android library module
//    3. Downloads/copies model weights into dist/bundle/
//
//  To enable Qwen3:
//  Step 1: pip install mlc-llm  (or install nightly wheel)
//  Step 2: Copy mlc-package-config.json to project root
//  Step 3: python3 -m mlc_llm package
//  Step 4: Uncomment the two lines below:
// include ':mlc4j'
// project(':mlc4j').projectDir = file('dist/lib/mlc4j')
//
//  Step 5: In app/build.gradle uncomment:
//          implementation project(':mlc4j')
//  Step 6: In MLCEngineWrapper.kt set MLC_AVAILABLE = true
// ============================================================
